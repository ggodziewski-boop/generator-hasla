<!DOCTYPE html>
<html>

<head>
<title>Generator haseł</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:white;
}

.container{
background:rgba(0,0,0,0.4);
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

input{
padding:10px;
font-size:16px;
border:none;
border-radius:6px;
width:80px;
}

button{
padding:10px 20px;
font-size:16px;
margin-left:10px;
background:#00c9a7;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#00a78b;
}

#password{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Generator silnych haseł</h2>

<p>Podaj długość hasła</p>

<input type="number" id="length" value="12">

<button onclick="generatePassword()">Generuj</button>

<p id="password"></p>

</div>

<script>

function generatePassword(){

let length = document.getElementById("length").value;

let lower = "abcdefghijklmnopqrstuvwxyz";
let upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let numbers = "0123456789";
let symbols = "!@#$%^&*()_+";

let all = lower + upper + numbers + symbols;

let password = "";

/* dodajemy po jednym z każdego typu */

password += lower[Math.floor(Math.random()*lower.length)];
password += upper[Math.floor(Math.random()*upper.length)];
password += numbers[Math.floor(Math.random()*numbers.length)];
password += symbols[Math.floor(Math.random()*symbols.length)];

/* reszta znaków losowa */

for(let i=4;i<length;i++){
password += all[Math.floor(Math.random()*all.length)];
}

document.getElementById("password").innerText="Twoje hasło: "+password;

}

</script>

</body>

</html>
